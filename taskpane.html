<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NCC Email Signature Client</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Office.js -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <!-- ✅ MSAL.js (for Graph popup auth, no Office SSO) -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #333333;
      font-size: 13px;
    }
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .section-label {
      font-size: 10px;
      font-weight: bold;
      color: #005953;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .locked-field {
      background: #f7f7f7;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      color: #555;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .locked-badge {
      font-size: 9px;
      background: #e8e8e8;
      color: #888;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .btn-action {
      display: block;
      width: 100%;
      padding: 10px;
      background: #ec3426;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12.5px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 18px;
    }
    .btn-action:disabled {
      background: #ccc;
      cursor: default;
    }
    .status {
      font-size: 11px;
      color: #005953;
      margin-top: 8px;
      text-align: center;
    }
    .loading {
      padding: 24px 16px;
      text-align: center;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div id="loading" class="loading">
    Loading your profile…
  </div>

  <div id="main" style="display:none;">
    <div class="section">
      <div class="section-label">Profile</div>

      <label>Name</label>
      <div class="locked-field">
        <span id="display-name">—</span>
        <span class="locked-badge">auto</span>
      </div>

      <label>Role</label>
      <div class="locked-field">
        <span id="job-title">—</span>
        <span class="locked-badge">auto</span>
      </div>

      <label>Email</label>
      <div class="locked-field">
        <span id="email">—</span>
        <span class="locked-badge">auto</span>
      </div>

      <button class="btn-action" id="btn-action">
        Save & insert signature
      </button>

      <div class="status" id="action-status"></div>
    </div>
  </div>

  <!-- Your logic (uses MSAL popup auth) -->
  <script src="taskpane.js"></script>

</body>
</html>
